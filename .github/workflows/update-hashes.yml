name: Update package hashes

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-hashes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Get release info
        id: info
        env:
          REF_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          VERSION="${REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "repo=$REPO" >> "$GITHUB_OUTPUT"

      - name: Download release tarball and compute SHA256
        id: hash
        env:
          REPO: ${{ steps.info.outputs.repo }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          curl -fsSL "https://github.com/${REPO}/archive/refs/tags/${REF_NAME}.tar.gz" -o release.tar.gz
          HASH=$(sha256sum release.tar.gz | cut -d' ' -f1)
          echo "sha256=$HASH" >> "$GITHUB_OUTPUT"
          echo "Computed SHA256: $HASH"

      - name: Update Homebrew formula
        env:
          VERSION: ${{ steps.info.outputs.version }}
          HASH: ${{ steps.hash.outputs.sha256 }}
        run: |
          sed -i "s|archive/refs/tags/v[0-9.]*\.tar\.gz|archive/refs/tags/v${VERSION}.tar.gz|" Formula/dploy.rb
          sed -i "s|sha256 \".*\"|sha256 \"${HASH}\"|" Formula/dploy.rb
          sed -i "s|\"dploy v[0-9.]*\"|\"dploy v${VERSION}\"|" Formula/dploy.rb

      - name: Update Scoop manifest
        env:
          VERSION: ${{ steps.info.outputs.version }}
          HASH: ${{ steps.hash.outputs.sha256 }}
          REPO: ${{ steps.info.outputs.repo }}
        run: |
          python3 -c "
          import json, os
          v = os.environ['VERSION']
          h = os.environ['HASH']
          r = os.environ['REPO']
          with open('scoop/dploy.json', 'r') as f:
              data = json.load(f)
          data['version'] = v
          data['hash'] = h
          data['url'] = f'https://github.com/{r}/archive/refs/tags/v{v}.tar.gz'
          data['extract_dir'] = f'dploy-{v}'
          with open('scoop/dploy.json', 'w') as f:
              json.dump(data, f, indent=4)
              f.write('\n')
          "

      - name: Commit and push
        env:
          VERSION: ${{ steps.info.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/dploy.rb scoop/dploy.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update package hashes for v${VERSION}"
            git push
          fi
